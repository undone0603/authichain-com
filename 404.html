<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | AuthiChain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .logo { font-size: 1.6rem; font-weight: 800; color: #00d4ff; text-decoration: none; margin-bottom: 3rem; }
    .code { font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, #00d4ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 1rem; }
    p { color: #94a3b8; font-size: 1rem; max-width: 400px; line-height: 1.6; margin-bottom: 2.5rem; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .link-btn { padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
    .link-btn.primary { background: #00d4ff; color: #000; }
    .link-btn.outline { border: 1px solid #1e2a3a; color: #94a3b8; }
    .link-btn.outline:hover { border-color: #00d4ff; color: #00d4ff; }
    .verify-hint { margin-top: 3rem; background: #0f1623; border: 1px solid #1e2a3a; border-radius: 12px; padding: 1.5rem; max-width: 500px; }
    .verify-hint p { color: #64748b; font-size: 0.875rem; margin-bottom: 1rem; }
    .verify-row { display: flex; gap: 0.5rem; }
    .verify-row input { flex: 1; background: #0a0a0f; border: 1px solid #1e2a3a; border-radius: 6px; padding: 0.6rem 0.85rem; color: #e2e8f0; font-size: 0.875rem; outline: none; }
    .verify-row input:focus { border-color: #00d4ff; }
    .verify-row button { background: #00d4ff; color: #000; border: none; border-radius: 6px; padding: 0.6rem 1rem; font-weight: 700; font-size: 0.875rem; cursor: pointer; }
  </style>
</head>
<body>
  <a href="/" class="logo">AuthiChain</a>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>This page doesn't exist or may have been moved. Looking to verify a product? Use the quick lookup below.</p>
  <div class="links">
    <a href="/" class="link-btn primary">Go Home</a>
    <a href="/verify" class="link-btn outline">Verify a Product</a>
    <a href="/docs" class="link-btn outline">API Docs</a>
    <a href="/contact" class="link-btn outline">Contact</a>
  </div>
  <div class="verify-hint">
    <p>Trying to verify a product? Enter your product ID or certificate ID:</p>
    <div class="verify-row">
      <input type="text" id="vid" placeholder="AUTH-2025-XXXXX or cert ID" />
      <button onclick="location.href='/verify?id='+encodeURIComponent(document.getElementById('vid').value)">Verify</button>
    </div>
  </div>
</body>
</html>
